<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#06030f"/>

  <!-- Blade glow -->
  <polygon points="256,52 234,220 278,220" fill="#3b82f6" opacity="0.2" filter="url(#glow)"/>

  <!-- Blade -->
  <polygon points="256,52 237,220 275,220" fill="url(#blade)"/>

  <!-- Blade center highlight -->
  <line x1="256" y1="60" x2="256" y2="212" stroke="rgba(255,255,255,0.22)" stroke-width="4"/>

  <!-- Crossguard -->
  <rect x="142" y="220" width="228" height="30" rx="15" fill="#3b82f6"/>
  <circle cx="142" cy="235" r="20" fill="#2563eb"/>
  <circle cx="370" cy="235" r="20" fill="#2563eb"/>

  <!-- Grip -->
  <rect x="241" y="250" width="30" height="108" rx="15" fill="#60a5fa"/>

  <!-- Grip wrap -->
  <line x1="241" y1="277" x2="271" y2="277" stroke="#1d4ed8" stroke-width="5" opacity="0.5"/>
  <line x1="241" y1="303" x2="271" y2="303" stroke="#1d4ed8" stroke-width="5" opacity="0.5"/>
  <line x1="241" y1="329" x2="271" y2="329" stroke="#1d4ed8" stroke-width="5" opacity="0.5"/>

  <!-- Pommel (diamante) -->
  <polygon points="256,361 292,394 256,427 220,394" fill="#3b82f6"/>
  <polygon points="256,371 282,394 256,417 230,394" fill="#93c5fd"/>

  <defs>
    <linearGradient id="blade" x1="256" y1="52" x2="256" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="60%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
    </filter>
  </defs>
</svg>
